services:
  - type: web
    name: dlh-tasikmalaya-enterprise
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn wsgi:app"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_EMAIL
        value: admin@dlh.local
      - key: ADMIN_PASSWORD
        value: admin123
