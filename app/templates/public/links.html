{% extends "public/base.html" %}
{% block title %}Link Terkait | DLH Kota Tasikmalaya{% endblock %}
{% block page_css %}<link rel="stylesheet" href="{{ url_for('static', filename='css/pages/content.css') }}">{% endblock %}
{% block content %}
<section class="page-hero"><span>Link</span><h1>Link Terkait</h1></section>
<section class="section"><div class="card-grid three">{% for item in items %}<a class="card reveal" href="{{ item.url }}" target="_blank"><div class="icon">{{ item.icon }}</div><h3>{{ item.name }}</h3><p>{{ item.description }}</p></a>{% endfor %}</div></section>
{% endblock %}
