{% extends "admin/base.html" %}
{% block content %}
<h1>CMS Berita</h1>
<form class="admin-form" method="post" enctype="multipart/form-data"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><input name="title" placeholder="Judul" required><input name="slug" placeholder="slug" required><input name="excerpt" placeholder="Excerpt" required><select name="category_id">{% for cat in categories %}<option value="{{ cat.id }}">{{ cat.name }}</option>{% endfor %}</select><input type="file" name="image"><textarea name="content" placeholder="Isi berita" required></textarea><button>Tambah</button></form>
<section class="admin-card"><table><tr><th>ID</th><th>Judul</th><th>Kategori</th><th>Views</th><th>Aksi</th></tr>{% for item in items.items %}<tr><td>{{ item.id }}</td><td>{{ item.title }}</td><td>{{ item.category.name if item.category else '-' }}</td><td>{{ item.views }}</td><td><form method="post" action="{{ url_for('admin.news_delete', item_id=item.id) }}"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><button class="danger">Hapus</button></form></td></tr>{% endfor %}</table></section>
{% endblock %}
